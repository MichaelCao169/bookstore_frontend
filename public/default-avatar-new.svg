<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Beautiful gradient background -->
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Highlight filter -->
    <filter id="highlight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circular background with gradient -->
  <circle cx="100" cy="100" r="100" fill="url(#avatarGradient)" filter="url(#shadow)"/>
  
  <!-- User icon - head -->
  <circle cx="100" cy="75" r="30" fill="#ffffff" opacity="0.95" filter="url(#highlight)"/>
  
  <!-- User icon - body (more refined shape) -->
  <path d="M 50 160 
           Q 50 130 100 130 
           Q 150 130 150 160 
           Q 150 180 100 180 
           Q 50 180 50 160 Z" 
        fill="#ffffff" opacity="0.95" filter="url(#highlight)"/>
  
  <!-- Subtle inner highlight for depth -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
  <!-- Small sparkle effect -->
  <circle cx="140" cy="60" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="75" cy="45" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="125" cy="140" r="1" fill="#ffffff" opacity="0.7"/>
</svg>
